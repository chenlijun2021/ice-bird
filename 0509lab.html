<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>易经美学实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
        
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes scanY {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .animate-scan-y { animation: scanY 2.5s ease-in-out infinite; }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .zoom-in-95 { animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* 微信内长按保存优化 */
        .poster-container { user-select: none; -webkit-touch-callout: default; }
    </style>
</head>
<body class="bg-[#F0F0F0] overflow-hidden">
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ 极其重要：在此处填写你申请的 Gemini API Key
        // ==========================================
        const apiKey = "AIzaSyCYKMGDDcji7woHeGjsyxnUkSJ7IBGf1P0"; 

        const Icons = {
            Scan: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M9 12h6M12 9v6" />
                </svg>
            ),
            Close: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            ),
            Loading: () => (
                <svg className="animate-spin" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" strokeOpacity="0.2" />
                    <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeLinecap="round" />
                </svg>
            )
        };

        function App() {
            const [step, setStep] = useState('entry');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [theme, setTheme] = useState('lab');
            const [showPoster, setShowPoster] = useState(false);
            const [generatedIllustration, setGeneratedIllustration] = useState(null);
            const [isGeneratingImg, setIsGeneratingImg] = useState(false);
            const [decryptText, setDecryptText] = useState('00000000');
            const [errorMsg, setErrorMsg] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (!loading) return;
                const interval = setInterval(() => {
                    setDecryptText(Math.random().toString(36).substring(2, 10).toUpperCase());
                }, 80);
                return () => clearInterval(interval);
            }, [loading]);

            const extractJSON = (text) => {
                try {
                    const markdownMatch = text.match(/```json\s*([\s\S]*?)\s*```/) || text.match(/```\s*([\s\S]*?)\s*```/);
                    if (markdownMatch) return JSON.parse(markdownMatch[1].trim());
                    const start = text.indexOf('{');
                    const end = text.lastIndexOf('}');
                    if (start !== -1 && end !== -1) return JSON.parse(text.substring(start, end + 1).trim());
                    return JSON.parse(text.trim());
                } catch (e) { throw new Error("解析 AI 返回的数据失败，请重试。"); }
            };

            // 图像压缩函数：降低分辨率和质量以适配 API 传输
            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800;
                            const scale = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            // 压缩为 JPEG 格式，0.7 质量
                            resolve(canvas.toDataURL('image/jpeg', 0.7));
                        };
                    };
                });
            };

            const generateIllustration = async (moodData) => {
                setIsGeneratingImg(true);
                const prompt = `Minimalist black ink line drawing, white background, simple object. Subject: ${moodData.illustration_prompt}. Zen style.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: { prompt }, parameters: { sampleCount: 1 } })
                    });
                    const result = await response.json();
                    if (result.predictions?.[0]) setGeneratedIllustration(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
                } catch (err) { console.error(err); }
                finally { setIsGeneratingImg(false); }
            };

            const runProtocol = async (base64Image) => {
                setLoading(true);
                setErrorMsg('');
                const prompt = `作为易经命理实验室AI，请分析这张掌纹图片。必须严格输出JSON，不要有说明文字：{"protocol_id": "ARCHIVE-${Math.floor(Math.random()*9000)+1000}","hexagram": "卦名","core_insight": "针对纹路给出3句观测记录","poster_quote": "一句具有哲学高度的金句","metrics": {"天位": 80, "地位": 70, "人位": 60},"aesthetic_guide": {"color_name": "建议色名称","color_hex": "#HEX","outfit_detail": "穿搭建议","vibe": "气质关键词"},"illustration_prompt": "a simple noun of a healing object in English"}`;
                
                try {
                    if (!apiKey) throw new Error("未检测到 API Key，请在代码中填写。");

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image.split(',')[1] } }] }] })
                    });
                    
                    const resData = await response.json();
                    if (resData.error) throw new Error(resData.error.message);

                    const text = resData.candidates?.[0]?.content?.parts?.[0]?.text;
                    const json = extractJSON(text);
                    setData(json);
                    setStep('report');
                    generateIllustration(json);
                } catch (err) {
                    setErrorMsg(err.message || "服务暂时不可用，请检查 API Key 或网络。");
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setLoading(true);
                    const compressed = await compressImage(file);
                    runProtocol(compressed);
                }
            };

            const c = theme === 'lab' ? 
                { bg: 'bg-[#F0F0F0]', card: 'bg-white', text: 'text-[#121212]', accent: 'border-[#E0E0E0]' } : 
                { bg: 'bg-[#E8DDC3]', card: 'bg-[#F2EBD7]', text: 'text-[#483A2C]', accent: 'border-[#D0C4A8]' };

            return (
                <div className={`min-h-screen ${c.bg} flex items-center justify-center p-4 transition-colors duration-700`}>
                    <div className={`w-full max-w-[400px] h-[844px] ${c.card} ${c.text} rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col border border-black/5`}>
                        
                        {errorMsg && (
                            <div className="absolute top-20 left-4 right-4 bg-red-500 text-white text-[10px] p-3 rounded-xl z-[100] animate-fade-in shadow-lg">
                                ⚠️ 错误: {errorMsg}
                            </div>
                        )}

                        <header className={`p-6 pb-4 border-b ${c.accent} flex justify-between items-center bg-inherit z-20`}>
                            <div className="space-y-0.5">
                                <h2 className="text-sm font-black tracking-tighter uppercase">Yi Jing Lab</h2>
                                <p className="text-[9px] opacity-30 font-mono tracking-widest">Protocol v4.5_FIX</p>
                            </div>
                            <div className="flex bg-black/5 p-1 rounded-full border border-black/5">
                                <button onClick={() => setTheme('lab')} className={`px-4 py-1 rounded-full text-[10px] font-bold ${theme === 'lab' ? 'bg-white shadow-sm' : 'opacity-30'}`}>工业</button>
                                <button onClick={() => setTheme('paper')} className={`px-4 py-1 rounded-full text-[10px] font-bold ${theme === 'paper' ? 'bg-white shadow-sm' : 'opacity-30'}`}>宣纸</button>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto scrollbar-hide">
                            {step === 'entry' ? (
                                <div className="p-8 h-full flex flex-col animate-fade-in">
                                    <div className="mt-6 space-y-4">
                                        <h1 className="text-[42px] font-black leading-[0.9] tracking-tighter">拓扑<br/>解析</h1>
                                        <div className="h-0.5 w-8 bg-current opacity-20"></div>
                                        <p className="text-xs leading-relaxed opacity-60">上传您的掌纹样本。我们将结合 AI 模型与易经拓扑逻辑，解析您的美学能量场。</p>
                                    </div>
                                    <div className="flex-1 flex items-center justify-center">
                                        <div onClick={() => !loading && fileInputRef.current.click()} className={`w-full aspect-square border-2 border-dashed ${c.accent} rounded-[2rem] flex flex-col items-center justify-center relative overflow-hidden transition-all ${loading ? 'bg-black/5' : 'cursor-pointer hover:bg-black/5 active:scale-95'}`}>
                                            {loading ? (
                                                <div className="flex flex-col items-center space-y-5">
                                                    <Icons.Loading />
                                                    <div className="text-center">
                                                        <div className="text-[11px] font-black tracking-widest animate-pulse">正在处理样本...</div>
                                                        <div className="text-[9px] font-mono opacity-40 uppercase tracking-tighter">{decryptText}</div>
                                                    </div>
                                                    <div className="absolute top-0 left-0 w-full h-1 bg-current opacity-20 animate-scan-y"></div>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="p-4 bg-current/5 rounded-full mb-4"><Icons.Scan /></div>
                                                    <span className="text-xs font-bold opacity-40">上传/拍摄掌纹</span>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleUpload} accept="image/*" />
                                </div>
                            ) : (
                                <div className="p-8 space-y-10 animate-fade-in pb-32">
                                    <div className="space-y-2">
                                        <div className="text-[10px] font-bold opacity-20 font-mono tracking-widest uppercase">Result // {data.protocol_id}</div>
                                        <h1 className="text-5xl font-black tracking-tighter">{data.hexagram}卦</h1>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="text-[11px] font-black opacity-30 tracking-[0.2em] border-b pb-2 border-current/10 uppercase">核心观测</div>
                                        <p className="text-[13px] leading-relaxed text-justify opacity-90">{data.core_insight}</p>
                                    </div>
                                    <div className="p-6 border border-current/10 rounded-[1.5rem] bg-black/[0.02] space-y-6">
                                        <div className="text-[11px] font-black opacity-30 tracking-[0.2em] uppercase">美学介入建议</div>
                                        <div className="flex items-center space-x-4">
                                            <div className="w-12 h-12 rounded-full border border-black/5 shadow-inner" style={{ backgroundColor: data.aesthetic_guide.color_hex }}></div>
                                            <div className="space-y-0.5">
                                                <div className="text-xs font-bold">{data.aesthetic_guide.color_name}</div>
                                                <div className="text-[9px] opacity-30 font-mono">{data.aesthetic_guide.color_hex}</div>
                                            </div>
                                        </div>
                                        <div className="space-y-5">
                                            <div className="text-[12px]"><span className="font-bold opacity-30 block text-[9px] mb-1 uppercase">Outfit</span>{data.aesthetic_guide.outfit_detail}</div>
                                            <div className="text-[12px]"><span className="font-bold opacity-30 block text-[9px] mb-1 uppercase">Vibe</span>{data.aesthetic_guide.vibe}</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        {step === 'report' && (
                            <div className="absolute bottom-0 left-0 right-0 p-6 bg-inherit/80 backdrop-blur-md border-t border-current/5 flex space-x-3 z-30">
                                <button onClick={() => setStep('entry')} className="h-14 px-6 border border-current/10 rounded-2xl flex items-center justify-center font-bold text-xs opacity-40 hover:opacity-100">重测</button>
                                <button onClick={() => setShowPoster(true)} className="flex-1 h-14 bg-[#111111] text-white rounded-2xl text-[11px] font-bold tracking-[0.2em] active:scale-95 shadow-xl">生成分享海报</button>
                            </div>
                        )}

                        {showPoster && (
                            <div className="absolute inset-0 z-[100] bg-black/95 backdrop-blur-2xl p-6 flex flex-col items-center justify-center animate-fade-in">
                                <div className="w-full max-w-[340px] aspect-[4/6] bg-white rounded-[2.5rem] p-10 flex flex-col relative overflow-hidden shadow-2xl text-[#111111] poster-container">
                                    <div className="absolute inset-0 pointer-events-none opacity-[0.05]" style={{ backgroundImage: `url('https://www.transparenttextures.com/patterns/handmade-paper.png')` }}></div>
                                    <header className="flex justify-between items-start mb-4">
                                        <div className="text-3xl font-black tracking-tighter">{data.hexagram}卦</div>
                                        <div className="text-[8px] font-mono opacity-20 text-right uppercase leading-tight">I Ching<br/>Aesthetic Lab</div>
                                    </header>
                                    <div className="h-px w-full bg-black/5 mb-8"></div>
                                    <div className="flex-1 flex flex-col justify-center items-center">
                                        <div className="w-80 aspect-square relative flex items-center justify-center">
                                            {isGeneratingImg ? (
                                                <div className="flex flex-col items-center space-y-2">
                                                    <Icons.Loading />
                                                    <span className="text-[8px] opacity-30 uppercase">AI Drawing...</span>
                                                </div>
                                            ) : generatedIllustration ? (
                                                <img src={generatedIllustration} className="w-full h-full object-contain mix-blend-multiply opacity-90 zoom-in-95" />
                                            ) : (
                                                <div className="text-[9px] opacity-10">Drawing...</div>
                                            )}
                                        </div>
                                        <div className="mt-8 text-center px-4">
                                            <div className="text-[16px] font-bold leading-snug">“ {data.poster_quote} ”</div>
                                            <div className="text-[9px] opacity-30 italic mt-2">Personal Aesthetic Archive</div>
                                        </div>
                                    </div>
                                    <footer className="mt-auto pt-8 flex justify-between items-end">
                                        <div className="flex items-center space-x-3">
                                            <div className="w-4 h-4 rounded-full shadow-inner" style={{ backgroundColor: data.aesthetic_guide.color_hex }}></div>
                                            <span className="text-[9px] font-bold opacity-40 uppercase">{data.aesthetic_guide.color_name}</span>
                                        </div>
                                        <div className="text-[7px] font-mono opacity-20 uppercase tracking-[0.3em]">Encrypted_Doc</div>
                                    </footer>
                                </div>
                                <div className="mt-8 flex flex-col items-center space-y-6">
                                    <span className="text-white/50 text-[10px] font-bold tracking-[0.3em] uppercase animate-pulse">长按图片保存到相册</span>
                                    <button onClick={() => setShowPoster(false)} className="w-14 h-14 rounded-full bg-white/10 text-white flex items-center justify-center hover:bg-white/20 transition-all"><Icons.Close /></button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
