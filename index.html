<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>卦象实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 用于生成长按保存的图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8F8F8; overflow: hidden; }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        
        /* 扫描动画 */
        @keyframes scanY { 
            0% { top: 0%; opacity: 0; } 
            10% { opacity: 1; } 
            90% { opacity: 1; } 
            100% { top: 100%; opacity: 0; } 
        }
        .animate-scan-y { animation: scanY 2.5s ease-in-out infinite; }
        
        /* 渐入动画 */
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full">
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const apiKey = ""; 
        const MODEL_ID = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [step, setStep] = useState('entry');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            
            // 海报状态
            const [showPoster, setShowPoster] = useState(false);
            const [generatingPoster, setGeneratingPoster] = useState(false);
            const [posterImg, setPosterImg] = useState(null);
            
            const fileInputRef = useRef(null);

            // 清理 JSON 字符串中的 Markdown 标记
            const cleanJsonResponse = (text) => {
                let cleaned = text.trim();
                cleaned = cleaned.replace(/^```[a-z]*\n/i, "").replace(/\n```$/i, "");
                return cleaned;
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1000; 
                            const scale = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                        };
                    };
                });
            };

            const callAI = async (base64Data, retries = 5) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${apiKey}`;
                
                // 强化了“易经蒸馏”与手相结合的 Prompt
                const prompt = `你是一位深谙《易经》精髓的数字算力大师。请仔细观察并深度分析这张手掌照片中的掌纹走向（如生命线、智慧线、感情线）、掌丘的丰瘪状态。
                将提取到的手相生物特征与易经的阴阳、五行、八卦理论进行融合与蒸馏，推演其当前生命能量所对应的易经卦象。
                
                必须严格返回 JSON 格式，不要包含任何 Markdown 代码块标签，字段如下：
                {
                    "hexagram": "卦名(如：乾、坤、泰等)",
                    "core_insight": "结合具体的掌纹特征与易经卦理的深度解析(80-120字，必须明确点出具体的掌纹特征是如何映射到该卦象的)",
                    "poster_quote": "一句具有哲理与情绪抚慰价值的美学金句(结合卦象意境)",
                    "aesthetic_guide": {
                        "color_hex": "一个符合该卦象五行意境的十六进制颜色代码",
                        "color_name": "颜色的中文意境名",
                        "vibe": "气质关键词(3个，逗号隔开)",
                        "outfit_detail": "具体的穿搭或配饰建议"
                    }
                }`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                        ]
                    }],
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                };

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                        const res = await response.json();
                        const rawText = res.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!rawText) throw new Error("Empty response from AI");

                        const cleanedJson = cleanJsonResponse(rawText);
                        return JSON.parse(cleanedJson);
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
                    }
                }
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true);
                setErrorMsg('');
                setPosterImg(null); // 重置海报
                
                try {
                    const base64 = await compressImage(file);
                    const result = await callAI(base64);
                    setData(result);
                    setStep('report');
                } catch (err) {
                    console.error("Analysis Error:", err);
                    setErrorMsg(`解析中断：请确保上传了清晰的手掌照片并稍后重试。(${err.message})`);
                } finally {
                    setLoading(false);
                }
            };

            // 生成长按保存的海报逻辑
            const handleGeneratePoster = () => {
                setShowPoster(true);
                setGeneratingPoster(true);
                
                // 给 DOM 渲染留出一点点时间
                setTimeout(async () => {
                    try {
                        const element = document.getElementById('poster-template');
                        if (element) {
                            const canvas = await html2canvas(element, { 
                                scale: 2, 
                                backgroundColor: '#ffffff',
                                useCORS: true 
                            });
                            setPosterImg(canvas.toDataURL('image/png'));
                        }
                    } catch (err) {
                        console.error("海报生成失败", err);
                        setErrorMsg("海报生成失败，请重试");
                    } finally {
                        setGeneratingPoster(false);
                    }
                }, 500);
            };

            return (
                <div className="fixed inset-0 bg-[#F0F0F0] flex items-center justify-center p-0 sm:p-4">
                    {/* 手机容器模拟 */}
                    <div className="w-full h-full sm:w-[400px] sm:h-[800px] bg-white sm:rounded-[3rem] shadow-2xl relative flex flex-col overflow-hidden border border-black/5">
                        
                        {/* 状态通知 */}
                        {errorMsg && (
                            <div className="absolute top-12 left-6 right-6 bg-red-50 text-red-600 text-[11px] p-4 rounded-2xl z-[100] animate-fade-in border border-red-100 shadow-sm flex justify-between items-center">
                                <span className="flex-1 font-medium">{errorMsg}</span>
                                <button onClick={() => setErrorMsg('')} className="ml-4 font-black uppercase tracking-widest text-[10px]">Close</button>
                            </div>
                        )}

                        {/* 头部 */}
                        <header className="pt-16 px-10 pb-6 shrink-0">
                            <h2 className="text-[10px] font-black tracking-[0.4em] uppercase opacity-20 mb-1">Hexagram Lab</h2>
                            <h1 className="text-3xl font-black tracking-tighter">卦象实验室</h1>
                        </header>

                        {/* 主内容区 */}
                        <main className="flex-1 px-10 flex flex-col overflow-hidden">
                            {step === 'entry' ? (
                                <div className="flex-1 flex flex-col justify-center animate-fade-in pb-10">
                                    <div 
                                        onClick={() => !loading && fileInputRef.current.click()} 
                                        className={`w-full aspect-[4/5] border-2 border-dashed border-black/5 rounded-[2.5rem] flex flex-col items-center justify-center relative transition-all duration-500 ${loading ? 'bg-gray-50' : 'hover:border-black/20 cursor-pointer active:scale-[0.98]'}`}
                                    >
                                        {loading ? (
                                            <div className="text-center space-y-6">
                                                <div className="relative">
                                                    <div className="w-16 h-16 border-[3px] border-black/5 border-t-black rounded-full animate-spin mx-auto"></div>
                                                    <div className="absolute inset-0 flex items-center justify-center text-[10px] font-bold">AI</div>
                                                </div>
                                                <p className="text-[10px] font-black tracking-[0.3em] uppercase animate-pulse">正在蒸馏易经算力...</p>
                                                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-black/5 to-transparent h-1 w-full animate-scan-y"></div>
                                            </div>
                                        ) : (
                                            <div className="text-center group">
                                                <div className="w-16 h-16 rounded-full bg-black text-white flex items-center justify-center text-2xl mb-6 group-hover:scale-110 transition-transform mx-auto">＋</div>
                                                <div className="text-[11px] font-black tracking-[0.2em] uppercase opacity-40">上传手掌相片</div>
                                                <div className="text-[9px] mt-2 opacity-20 font-medium">Capture your palm line</div>
                                            </div>
                                        )}
                                    </div>
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleUpload} accept="image/*" />
                                </div>
                            ) : (
                                <div className="animate-fade-in space-y-10 py-4 no-scrollbar overflow-y-auto">
                                    {/* 卦象结果 */}
                                    <section>
                                        <div className="text-[10px] font-black opacity-20 tracking-[0.3em] uppercase mb-4">The Hexagram</div>
                                        <div className="flex items-baseline gap-2">
                                            <h3 className="text-7xl font-black tracking-tighter">{data?.hexagram}</h3>
                                            <span className="text-xl font-bold opacity-30">卦</span>
                                        </div>
                                    </section>

                                    {/* 解析 */}
                                    <section className="space-y-4">
                                        <div className="w-12 h-1.5 bg-black"></div>
                                        <p className="text-[15px] leading-relaxed text-black/70 font-medium italic">“{data?.poster_quote}”</p>
                                        <p className="text-xs leading-loose text-black/50 font-medium text-justify">{data?.core_insight}</p>
                                    </section>

                                    {/* 美学指南卡片 */}
                                    <section className="p-8 rounded-[2.5rem] bg-gray-50 border border-black/5 space-y-8 mb-6">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="text-[9px] font-black opacity-30 uppercase tracking-widest mb-1">Color Palette</div>
                                                <div className="font-bold text-sm uppercase">{data?.aesthetic_guide?.color_name}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="w-12 h-12 rounded-2xl shadow-lg border-2 border-white" style={{backgroundColor: data?.aesthetic_guide?.color_hex}}></div>
                                                <div className="text-[9px] font-mono mt-1 opacity-40 font-bold uppercase">{data?.aesthetic_guide?.color_hex}</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-6">
                                            <div className="space-y-1">
                                                <span className="text-[9px] font-black opacity-20 uppercase tracking-tighter text-black">Vibe Checklist</span>
                                                <p className="text-[11px] font-bold tracking-wide">{data?.aesthetic_guide?.vibe}</p>
                                            </div>
                                            <div className="space-y-1">
                                                <span className="text-[9px] font-black opacity-20 uppercase tracking-tighter text-black">Style Guide</span>
                                                <p className="text-[11px] font-bold leading-relaxed">{data?.aesthetic_guide?.outfit_detail}</p>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            )}
                        </main>

                        {/* 底部操作 */}
                        <footer className={`p-8 transition-all duration-700 ${step === 'report' ? 'translate-y-0 opacity-100' : 'translate-y-20 opacity-0'}`}>
                            <div className="flex gap-4">
                                <button 
                                    onClick={() => setStep('entry')} 
                                    className="flex-[1] h-14 bg-stone-100 text-stone-500 rounded-[1.25rem] text-[11px] font-black tracking-widest uppercase active:scale-95 transition-all shadow-sm"
                                >
                                    重置
                                </button>
                                <button 
                                    onClick={handleGeneratePoster} 
                                    className="flex-[2] h-14 bg-black text-white rounded-[1.25rem] text-[11px] font-black tracking-[0.2em] uppercase active:scale-95 transition-all shadow-xl hover:shadow-black/20"
                                >
                                    保存专属卦象卡
                                </button>
                            </div>
                        </footer>

                        {/* 用于生成海报的隐藏 DOM 模板 */}
                        {data && (
                            <div id="poster-template" className="w-[360px] bg-[#F8F8F8] p-8 flex flex-col relative font-sans text-black" style={{ position: 'fixed', top: '-9999px', left: '-9999px' }}>
                                <div className="border border-black/10 rounded-[2rem] bg-white p-8 flex flex-col shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 rounded-bl-full opacity-10" style={{backgroundColor: data.aesthetic_guide.color_hex}}></div>
                                    <h2 className="text-[9px] font-black tracking-[0.4em] uppercase opacity-30 mb-2">Hexagram Lab</h2>
                                    <h1 className="text-[40px] font-black tracking-tighter mb-6">{data.hexagram}卦</h1>
                                    <p className="text-[13px] font-medium italic text-gray-700 mb-6 leading-relaxed">“{data.poster_quote}”</p>
                                    <div className="w-12 h-1 bg-black mb-6"></div>
                                    <p className="text-[11px] leading-[1.8] text-gray-600 mb-8 font-medium">{data.core_insight}</p>
                                    <div className="flex items-center gap-4 border-t border-black/5 pt-6">
                                        <div className="w-10 h-10 rounded-full shadow-inner border border-black/5" style={{backgroundColor: data.aesthetic_guide.color_hex}}></div>
                                        <div>
                                            <p className="text-[8px] font-black opacity-30 uppercase tracking-widest mb-1">专属能量色</p>
                                            <p className="text-xs font-bold">{data.aesthetic_guide.color_name} <span className="font-mono opacity-50 ml-1">{data.aesthetic_guide.color_hex}</span></p>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-between items-end px-2">
                                    <div className="text-[9px] tracking-widest opacity-30 uppercase font-black text-left">
                                        Powered by<br/>卦象实验室
                                    </div>
                                    <div className="w-8 h-8 border border-black/20 rounded flex items-center justify-center text-[6px] opacity-20 font-black">
                                        SCAN
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 海报预览模态框 */}
                        {showPoster && (
                            <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 animate-fade-in">
                                {generatingPoster ? (
                                    <div className="text-white flex flex-col items-center gap-4">
                                        <div className="w-10 h-10 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                                        <p className="text-xs font-bold tracking-widest uppercase animate-pulse">正在精绘专属卦象卡...</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center w-full max-w-[320px] animate-fade-in">
                                        {posterImg && <img src={posterImg} alt="卦象卡" className="w-full rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] mb-8" />}
                                        <p className="text-white/80 text-[11px] font-bold tracking-[0.3em] uppercase animate-pulse mb-8">
                                            👆 长按上方图片保存到相册
                                        </p>
                                        <button 
                                            onClick={() => setShowPoster(false)} 
                                            className="w-12 h-12 rounded-full bg-white/20 text-white flex items-center justify-center hover:bg-white/30 transition-all backdrop-blur-md"
                                        >
                                            <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12" /></svg>
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
