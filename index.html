<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺术实验：拙简容器与优雅飞翔 V3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Libre Baskerville', serif;
            transition: background-color 0.5s ease;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            z-index: 100;
            border: 1px solid rgba(0,0,0,0.05);
            width: 240px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-group label {
            display: block;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .actions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .btn {
            background: none;
            border: none;
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 10px 20px;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .btn:hover { color: #000; transform: translateY(-2px); }
        .btn.active { color: #000; font-weight: bold; border-bottom: 1px solid #000; }

        input[type="range"] {
            width: 100%;
            accent-color: #333;
        }

        .color-picker-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="color"] {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="panel">
        <div class="control-group">
            <div class="color-picker-row">
                <label>背景颜色</label>
                <input type="color" id="bgCol" value="#f7f5f2" onchange="updateColors()">
            </div>
        </div>
        <div class="control-group">
            <div class="color-picker-row">
                <label>杯子线条</label>
                <input type="color" id="lineCol" value="#2a2a2a">
            </div>
        </div>
        <div class="control-group">
            <div class="color-picker-row">
                <label>字符/飞鸟</label>
                <input type="color" id="textCol" value="#1a1a1a">
            </div>
        </div>
        <hr class="my-4 border-gray-200">
        <div class="control-group">
            <label>飞鸟速度</label>
            <input type="range" id="birdSpeed" min="1" max="10" value="5" step="0.1">
        </div>
        <div class="control-group">
            <label>自主引导强度</label>
            <input type="range" id="birdAgility" min="0.05" max="0.5" value="0.2" step="0.01">
        </div>
    </div>

    <div class="actions">
        <button class="btn" id="injectBtn" onclick="toggleInject()">填充注入</button>
        <button class="btn" id="awakenBtn" onclick="awaken()">翻转觉醒</button>
        <button class="btn" onclick="resetAll()">清空重置</button>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;

        let engine, render, runner, birds = [];
        let state = 'IDLE'; 
        let injectInterval = null;
        let wanderTarget = { x: window.innerWidth/2, y: window.innerHeight/4 };
        const W = window.innerWidth, H = window.innerHeight;
        
        let curPos = { x: W/2, y: H * 0.7 }, curAngle = 0;
        let physWalls = [];

        // 拙简杯子的手绘坐标（重新调整，增加重叠确保不漏）
        const CW = 110, CH = 140;
        const naiveLines = [
            // 左边一笔：从杯口延伸到底部以下一点，确保交接
            [{x: -CW-5, y: -CH}, {x: -CW, y: CH+10}],
            // 底部一笔：左右两端伸出一些，覆盖左右壁的连接点
            [{x: -CW-15, y: CH}, {x: CW+15, y: CH+5}],
            // 右边一笔：同左，向下延伸
            [{x: CW+5, y: CH+10}, {x: CW-5, y: -CH-10}]
        ];

        function setup() {
            engine = Engine.create();
            render = Render.create({
                element: document.getElementById('canvas-container'),
                engine: engine,
                options: { width: W, height: H, wireframes: false, background: 'transparent' }
            });

            // 物理边界厚度调大，增强碰撞检测
            const t = 20; 
            physWalls = naiveLines.map(line => {
                const start = line[0], end = line[1];
                const center = { x: (start.x + end.x)/2, y: (start.y + end.y)/2 };
                const length = Math.sqrt(Math.pow(end.x-start.x,2) + Math.pow(end.y-start.y,2));
                const angle = Math.atan2(end.y - start.y, end.x - start.x);
                
                return Bodies.rectangle(center.x, center.y, length, t, {
                    isStatic: true,
                    angle: angle,
                    render: { visible: false },
                    friction: 0.1,
                    slop: 0.5 // 允许一点嵌入，减少穿透
                });
            });
            Composite.add(engine.world, physWalls);

            Events.on(engine, 'beforeUpdate', () => {
                if (state === 'IDLE') {
                    const time = engine.timing.timestamp * 0.002;
                    curPos.y = (H * 0.7) + Math.sin(time) * 3;
                    curAngle = Math.sin(time * 0.6) * 0.01;
                }

                physWalls.forEach((wall, i) => {
                    const start = naiveLines[i][0], end = naiveLines[i][1];
                    const centerRel = { x: (start.x + end.x)/2, y: (start.y + end.y)/2 };
                    const angleRel = Math.atan2(end.y - start.y, end.x - start.x);

                    const cos = Math.cos(curAngle), sin = Math.sin(curAngle);
                    const rotatedX = centerRel.x * cos - centerRel.y * sin;
                    const rotatedY = centerRel.x * sin + centerRel.y * cos;

                    Body.setPosition(wall, { x: curPos.x + rotatedX, y: curPos.y + rotatedY });
                    Body.setAngle(wall, curAngle + angleRel);
                });
            });

            runner = Runner.create();
            Runner.run(runner, engine);
            
            setInterval(() => {
                wanderTarget = { x: Math.random() * W, y: Math.random() * (H/3) };
            }, 5000);

            updateColors();
            loop();
        }

        function updateColors() {
            document.body.style.backgroundColor = document.getElementById('bgCol').value;
        }

        function spawn() {
            const chars = "AbCdEfGhIjKlMnOpQrStUvWxYz".split("");
            const size = 18 + Math.random() * 22;
            // 投放区域收窄，确保在杯子正上方
            const xOffset = (Math.random() - 0.5) * (CW * 1.2);
            const b = Bodies.rectangle(curPos.x + xOffset, -50, size * 0.7, size * 0.8, {
                restitution: 0.1,
                friction: 0.3,
                angle: Math.random() * 0.4 - 0.2,
                char: chars[Math.floor(Math.random()*chars.length)],
                size: size,
                render: { visible: false },
                isFree: false
            });
            Composite.add(engine.world, b);
        }

        function toggleInject() {
            const btn = document.getElementById('injectBtn');
            if (injectInterval) { 
                clearInterval(injectInterval); injectInterval = null; 
                btn.classList.remove('active'); 
            } else { 
                injectInterval = setInterval(spawn, 150); 
                btn.classList.add('active'); 
            }
        }

        function awaken() {
            if (state !== 'IDLE') return;
            if (injectInterval) toggleInject();
            state = 'POURING';
            const sT = Date.now();
            const initialY = curPos.y;

            const pourAnimate = () => {
                if (state !== 'POURING') return;
                const p = Math.min((Date.now() - sT) / 2500, 1);
                
                curAngle = p * Math.PI * 0.95; 
                curPos.y = initialY - Math.sin(p * Math.PI) * 120;

                Composite.allBodies(engine.world).forEach(b => {
                    if (!b.isStatic && !b.isBird) {
                        if (curAngle > Math.PI * 0.55 && b.position.y > curPos.y - 100) {
                            if (!b.isFree) {
                                b.isFree = true;
                                b.releaseY = b.position.y;
                            }
                        }
                        // 顺畅过渡：掉落一定距离后开始化鸟
                        if (b.isFree && b.position.y - b.releaseY > 120) {
                            transformToBird(b);
                        }
                    }
                });

                if (p < 1) requestAnimationFrame(pourAnimate);
                else { state = 'REST'; }
            };
            pourAnimate();
        }

        function transformToBird(b) {
            b.isBird = true;
            const inheritedVelocity = Vector.clone(b.velocity);
            const maxAgility = parseFloat(document.getElementById('birdAgility').value);
            
            birds.push({
                pos: Vector.create(b.position.x, b.position.y),
                vel: Vector.mult(inheritedVelocity, 1.2), // 稍微增强初始冲量
                acc: {x: 0, y: 0},
                wing: Math.random() * 10,
                size: b.size,
                maxSpeed: parseFloat(document.getElementById('birdSpeed').value) * (0.8 + Math.random() * 0.4),
                influence: 0.02, // 初始影响力极低，维持物理轨迹
                maxInfluence: maxAgility
            });
            Composite.remove(engine.world, b);
        }

        function loop() {
            const ctx = render.context;
            const lineCol = document.getElementById('lineCol').value;
            const textCol = document.getElementById('textCol').value;
            const agility = parseFloat(document.getElementById('birdAgility').value);
            const baseMaxSpeed = parseFloat(document.getElementById('birdSpeed').value);

            ctx.clearRect(0, 0, W, H);

            // 1. 杯子
            ctx.save();
            ctx.translate(curPos.x, curPos.y);
            ctx.rotate(curAngle);
            ctx.strokeStyle = lineCol;
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            naiveLines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line[0].x, line[0].y);
                ctx.lineTo(line[1].x, line[1].y);
                ctx.stroke();
            });
            ctx.restore();

            // 2. 字母
            Composite.allBodies(engine.world).forEach(b => {
                if(!b.isStatic && !b.isBird) {
                    ctx.save();
                    ctx.translate(b.position.x, b.position.y);
                    ctx.rotate(b.angle);
                    ctx.fillStyle = textCol;
                    ctx.font = `${b.size}px 'Libre Baskerville', serif`;
                    ctx.textAlign = "center";
                    ctx.fillText(b.char, 0, 0);
                    ctx.restore();
                }
            });

            // 3. 飞鸟
            birds.forEach(b => {
                let sep = {x:0, y:0}, ali = {x:0, y:0}, coh = {x:0, y:0}, count = 0;
                birds.forEach(o => {
                    let d = Vector.magnitude(Vector.sub(b.pos, o.pos));
                    if(d > 0 && d < 60) {
                        sep = Vector.add(sep, Vector.div(Vector.normalise(Vector.sub(b.pos, o.pos)), d));
                        ali = Vector.add(ali, o.vel);
                        coh = Vector.add(coh, o.pos);
                        count++;
                    }
                });

                // 动量过渡逻辑：influence 慢慢爬升
                b.influence = Math.min(b.influence + 0.002, agility);
                b.maxSpeed = baseMaxSpeed; 
                
                if(count > 0) {
                    b.acc = Vector.add(b.acc, Vector.mult(Vector.normalise(sep), 0.5));
                    b.acc = Vector.add(b.acc, Vector.mult(Vector.normalise(ali), b.influence));
                    b.acc = Vector.add(b.acc, Vector.mult(Vector.normalise(Vector.sub(Vector.div(coh, count), b.pos)), 0.05));
                }

                let steer = Vector.sub(wanderTarget, b.pos);
                b.acc = Vector.add(b.acc, Vector.mult(Vector.normalise(steer), b.influence * 1.5));

                b.vel = Vector.add(b.vel, b.acc);
                let speed = Vector.magnitude(b.vel);
                if(speed > b.maxSpeed) b.vel = Vector.mult(Vector.normalise(b.vel), b.maxSpeed);
                
                b.pos = Vector.add(b.pos, b.vel);
                b.acc = {x:0, y:0};
                b.wing += 0.15;

                ctx.save();
                ctx.translate(b.pos.x, b.pos.y);
                ctx.rotate(Math.atan2(b.vel.y, b.vel.x));
                ctx.strokeStyle = textCol;
                ctx.lineWidth = 1.5;
                let s = b.size * 0.45;
                let w = Math.sin(b.wing) * s * 0.7;
                ctx.beginPath();
                ctx.moveTo(-s, w);
                ctx.quadraticCurveTo(0, -w*0.8, s, w);
                ctx.stroke();
                ctx.restore();
            });

            requestAnimationFrame(loop);
        }

        function resetAll() {
            if (injectInterval) { clearInterval(injectInterval); injectInterval = null; }
            document.getElementById('injectBtn').classList.remove('active');
            const characters = Composite.allBodies(engine.world).filter(b => !b.isStatic);
            Composite.remove(engine.world, characters);
            birds = []; state = 'IDLE'; curAngle = 0;
            curPos = { x: W/2, y: H * 0.7 };
        }

        window.onload = setup;
    </script>
</body>
</html>
